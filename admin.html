<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 - Blues Dance Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #252542;
      --bg-hover: #2d2d4a;
      --accent: #e6b800;
      --accent-dim: #c9a000;
      --text-primary: #f5f5f5;
      --text-secondary: #b8b8c8;
      --text-muted: #8888a0;
      --border: rgba(230, 184, 0, 0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --danger: #e63946;
      --success: #2ecc71;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; }

    /* Login Screen */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background: radial-gradient(ellipse at 50% 30%, rgba(230, 184, 0, 0.08) 0%, transparent 60%);
    }

    .login-box {
      background: var(--bg-card);
      padding: 3rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-box h1 {
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }

    .login-box p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.8;
    }

    .btn {
      padding: 0.9rem 2rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg-dark);
    }

    .btn-primary:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-secondary:hover {
      background: rgba(230, 184, 0, 0.1);
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .error-msg {
      color: var(--danger);
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    /* Admin Panel */
    .admin-panel {
      display: none;
      min-height: 100vh;
    }

    .admin-panel.active { display: block; }

    /* Header */
    .admin-header {
      background: var(--bg-card);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header h2 {
      color: var(--accent);
      font-size: 1.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    /* Main Content */
    .admin-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h3 {
      font-size: 1.8rem;
      color: var(--text-primary);
    }

    /* Tab Navigation */
    .tab-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s;
    }

    .tab-btn.active,
    .tab-btn:hover {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }

    /* Workshop Cards */
    .workshop-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .workshop-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.3s;
    }

    .workshop-card:hover {
      border-color: rgba(230, 184, 0, 0.3);
      box-shadow: var(--shadow);
    }

    .workshop-card-header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      cursor: pointer;
      background: var(--bg-card);
    }

    .workshop-card-header:hover {
      background: var(--bg-hover);
    }

    .workshop-info h4 {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-family: 'Playfair Display', serif;
    }

    .workshop-info .date {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .workshop-actions {
      display: flex;
      gap: 0.5rem;
    }

    .workshop-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .workshop-actions button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .workshop-actions .edit-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .workshop-actions .delete-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .workshop-preview {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.8;
    }

    /* Note Card Grid */
    .note-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .note-item {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .note-item:hover {
      border-color: rgba(230, 184, 0, 0.3);
      box-shadow: var(--shadow);
    }

    .note-item h4 {
      color: var(--accent);
      margin-bottom: 0.8rem;
      font-size: 1.1rem;
    }

    .note-item p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .note-item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .note-item-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .note-item-actions button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      color: var(--accent);
      font-size: 1.5rem;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 2000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--success);
    }

    .toast.error {
      border-color: var(--danger);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .empty-state h4 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--accent); }

    /* Content Type Badge */
    .content-type {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(230, 184, 0, 0.1);
      border-radius: 15px;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    @media (max-width: 768px) {
      .admin-header { flex-direction: column; gap: 1rem; text-align: center; }
      .admin-content { padding: 1rem; }
      .section-header { flex-direction: column; gap: 1rem; }
      .tab-nav { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>♪ Blues Dance</h1>
    <p>管理後台</p>
    <form id="loginForm">
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="請輸入管理密碼" required>
      </div>
      <button type="submit" class="btn btn-primary">登入</button>
      <p class="error-msg" id="loginError">密碼錯誤，請重試</p>
    </form>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <header class="admin-header">
    <h2>♪ Blues Dance 管理後台</h2>
    <div class="header-actions">
      <a href="index.html" class="back-link">← 返回網站</a>
      <button class="btn btn-secondary btn-small" onclick="logout()">登出</button>
    </div>
  </header>

  <main class="admin-content">
    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('workshops')">Workshop 筆記</button>
      <button class="tab-btn" onclick="switchTab('additional')">Day 2 筆記</button>
    </div>

    <!-- Workshop Notes Section -->
    <div id="workshopsSection">
      <div class="section-header">
        <h3>Workshop 筆記</h3>
        <button class="btn btn-primary" onclick="openWorkshopModal()">+ 新增 Workshop</button>
      </div>
      <div class="workshop-list" id="workshopList">
        <!-- Workshop cards will be loaded here -->
      </div>
    </div>

    <!-- Additional Notes Section -->
    <div id="additionalSection" style="display: none;">
      <div class="section-header">
        <h3>Day 2 額外筆記</h3>
        <button class="btn btn-primary" onclick="openAdditionalModal()">+ 新增筆記</button>
      </div>
      <div class="note-grid" id="additionalList">
        <!-- Note cards will be loaded here -->
      </div>
    </div>
  </main>
</div>

<!-- Workshop Modal -->
<div class="modal-overlay" id="workshopModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="workshopModalTitle">新增 Workshop 筆記</h3>
      <button class="modal-close" onclick="closeWorkshopModal()">&times;</button>
    </div>
    <form id="workshopForm">
      <div class="modal-body">
        <input type="hidden" id="workshopId">
        <div class="form-group">
          <label>標題</label>
          <input type="text" id="workshopTitle" placeholder="例如：第一課：Blues 的基礎" required>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="workshopDate" required>
        </div>
        <div class="form-group">
          <label>內容（每行一點，建議用換行分隔）</label>
          <textarea id="workshopContent" placeholder="例如：
核心概念：Blues 不是關於完美，而是關於真實與情感表達
音樂聆聽：先花 30 秒純粹聆聽音樂，感受氛圍再開始跳舞" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeWorkshopModal()">取消</button>
        <button type="submit" class="btn btn-primary">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- Additional Note Modal -->
<div class="modal-overlay" id="additionalModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="additionalModalTitle">新增 Day 2 筆記</h3>
      <button class="modal-close" onclick="closeAdditionalModal()">&times;</button>
    </div>
    <form id="additionalForm">
      <div class="modal-body">
        <input type="hidden" id="additionalId">
        <div class="form-group">
          <label>標題</label>
          <input type="text" id="additionalTitle" placeholder="例如：旋轉技巧" required>
        </div>
        <div class="form-group">
          <label>Emoji 圖示</label>
          <input type="text" id="additionalEmoji" placeholder="例如：🔄" required>
        </div>
        <div class="form-group">
          <label>內容</label>
          <textarea id="additionalContent" placeholder="輸入筆記內容..." required></textarea>
        </div>
        <div class="form-group">
          <label>所屬天數</label>
          <select id="additionalDay">
            <option value="1">Day 1</option>
            <option value="2" selected>Day 2</option>
            <option value="3">Day 3</option>
            <option value="4">Day 4</option>
            <option value="5">Day 5</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeAdditionalModal()">取消</button>
        <button type="submit" class="btn btn-primary">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>確認刪除</h3>
      <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p>確定要刪除「<span id="deleteTitle"></span>」嗎？此操作無法復原。</p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
      <button type="button" class="btn btn-danger" id="confirmDeleteBtn">刪除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // Configuration
  const ADMIN_PASSWORD = 'blues2026'; // Change this password as needed

  // State
  let workshops = [];
  let additionalNotes = [];
  let editingWorkshopId = null;
  let editingAdditionalId = null;
  let deletingItem = null;

  // DOM Elements
  const loginScreen = document.getElementById('loginScreen');
  const adminPanel = document.getElementById('adminPanel');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const workshopList = document.getElementById('workshopList');
  const additionalList = document.getElementById('additionalList');
  const workshopModal = document.getElementById('workshopModal');
  const additionalModal = document.getElementById('additionalModal');
  const deleteModal = document.getElementById('deleteModal');
  const workshopForm = document.getElementById('workshopForm');
  const additionalForm = document.getElementById('additionalForm');
  const toast = document.getElementById('toast');

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    loginForm.addEventListener('submit', handleLogin);
    workshopForm.addEventListener('submit', handleSaveWorkshop);
    additionalForm.addEventListener('submit', handleSaveAdditional);
  });

  // Check if already logged in
  function checkAuth() {
    const isLoggedIn = sessionStorage.getItem('bluesAdminAuth');
    if (isLoggedIn === 'true') {
      showAdminPanel();
      loadData();
    }
  }

  // Handle Login
  function handleLogin(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    
    if (password === ADMIN_PASSWORD) {
      sessionStorage.setItem('bluesAdminAuth', 'true');
      loginError.style.display = 'none';
      showAdminPanel();
      loadData();
    } else {
      loginError.style.display = 'block';
      document.getElementById('password').value = '';
    }
  }

  // Logout
  function logout() {
    sessionStorage.removeItem('bluesAdminAuth');
    loginScreen.style.display = 'flex';
    adminPanel.classList.remove('active');
    document.getElementById('password').value = '';
  }

  // Show Admin Panel
  function showAdminPanel() {
    loginScreen.style.display = 'none';
    adminPanel.classList.add('active');
  }

  // Switch Tab
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'workshops') {
      document.getElementById('workshopsSection').style.display = 'block';
      document.getElementById('additionalSection').style.display = 'none';
    } else {
      document.getElementById('workshopsSection').style.display = 'none';
      document.getElementById('additionalSection').style.display = 'block';
    }
  }

  // Load Data from localStorage (simulating JSON persistence)
  function loadData() {
    // Load workshops
    const workshopData = localStorage.getItem('bluesWorkshops');
    workshops = workshopData ? JSON.parse(workshopData) : [];
    
    // Load additional notes
    const additionalData = localStorage.getItem('bluesAdditionalNotes');
    additionalNotes = additionalData ? JSON.parse(additionalData) : [];
    
    renderWorkshops();
    renderAdditionalNotes();
  }

  // Save Workshops to localStorage
  function saveWorkshops() {
    localStorage.setItem('bluesWorkshops', JSON.stringify(workshops));
  }

  // Save Additional Notes to localStorage
  function saveAdditionalNotes() {
    localStorage.setItem('bluesAdditionalNotes', JSON.stringify(additionalNotes));
  }

  // Render Workshop Cards
  function renderWorkshops() {
    if (workshops.length === 0) {
      workshopList.innerHTML = `
        <div class="empty-state">
          <div class="icon">📝</div>
          <h4>還沒有任何 Workshop 筆記</h4>
          <p>點擊「新增 Workshop」來建立第一篇筆記</p>
        </div>
      `;
      return;
    }

    // Sort by date descending
    const sorted = [...workshops].sort((a, b) => new Date(b.date) - new Date(a.date));
    
    workshopList.innerHTML = sorted.map(workshop => `
      <div class="workshop-card" data-id="${workshop.id}">
        <div class="workshop-card-header" onclick="togglePreview('workshop', ${workshop.id})">
          <div class="workshop-info">
            <h4>${escapeHtml(workshop.title)}</h4>
            <span class="date">${formatDate(workshop.date)}</span>
          </div>
          <div class="workshop-actions" onclick="event.stopPropagation()">
            <button class="edit-btn" onclick="openWorkshopModal(${workshop.id})">編輯</button>
            <button class="delete-btn" onclick="openDeleteModal('workshop', ${workshop.id})">刪除</button>
          </div>
        </div>
        <div class="workshop-preview" id="workshop-preview-${workshop.id}" style="display: none;">
          ${escapeHtml(workshop.content)}
        </div>
      </div>
    `).join('');
  }

  // Render Additional Note Cards
  function renderAdditionalNotes() {
    if (additionalNotes.length === 0) {
      additionalList.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="icon">📋</div>
          <h4>還沒有任何 Day 2 筆記</h4>
          <p>點擊「新增筆記」來建立筆記卡片</p>
        </div>
      `;
      return;
    }

    additionalList.innerHTML = additionalNotes.map(note => `
      <div class="note-item" data-id="${note.id}">
        <span class="content-type">Day ${note.day}</span>
        <h4>${note.emoji} ${escapeHtml(note.title)}</h4>
        <p>${escapeHtml(note.content)}</p>
        <div class="note-item-actions">
          <button onclick="openAdditionalModal(${note.id})">編輯</button>
          <button onclick="openDeleteModal('additional', ${note.id})">刪除</button>
        </div>
      </div>
    `).join('');
  }

  // Toggle Preview
  function togglePreview(type, id) {
    const preview = document.getElementById(`${type}-preview-${id}`);
    preview.style.display = preview.style.display === 'none' ? 'block' : 'none';
  }

  // Open Workshop Modal
  function openWorkshopModal(id = null) {
    editingWorkshopId = id;
    
    if (id) {
      const workshop = workshops.find(w => w.id === id);
      if (!workshop) return;
      
      document.getElementById('workshopModalTitle').textContent = '編輯 Workshop 筆記';
      document.getElementById('workshopId').value = workshop.id;
      document.getElementById('workshopTitle').value = workshop.title;
      document.getElementById('workshopDate').value = workshop.date;
      document.getElementById('workshopContent').value = workshop.content;
    } else {
      document.getElementById('workshopModalTitle').textContent = '新增 Workshop 筆記';
      document.getElementById('workshopId').value = '';
      document.getElementById('workshopTitle').value = '';
      document.getElementById('workshopDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('workshopContent').value = '';
    }
    
    workshopModal.classList.add('active');
  }

  // Close Workshop Modal
  function closeWorkshopModal() {
    workshopModal.classList.remove('active');
    editingWorkshopId = null;
  }

  // Handle Save Workshop
  function handleSaveWorkshop(e) {
    e.preventDefault();

    const title = document.getElementById('workshopTitle').value.trim();
    const date = document.getElementById('workshopDate').value;
    const content = document.getElementById('workshopContent').value.trim();

    if (!title || !date || !content) {
      showToast('請填寫所有欄位', 'error');
      return;
    }

    if (editingWorkshopId) {
      // Update existing
      const index = workshops.findIndex(w => w.id === editingWorkshopId);
      if (index !== -1) {
        workshops[index] = { id: editingWorkshopId, title, date, content };
        showToast('筆記已更新', 'success');
      }
    } else {
      // Add new
      const newId = workshops.length > 0 
        ? Math.max(...workshops.map(w => w.id)) + 1 
        : 1;
      workshops.push({ id: newId, title, date, content });
      showToast('筆記已新增', 'success');
    }

    closeWorkshopModal();
    saveWorkshops();
    renderWorkshops();
  }

  // Open Additional Modal
  function openAdditionalModal(id = null) {
    editingAdditionalId = id;
    
    if (id) {
      const note = additionalNotes.find(n => n.id === id);
      if (!note) return;
      
      document.getElementById('additionalModalTitle').textContent = '編輯 Day 2 筆記';
      document.getElementById('additionalId').value = note.id;
      document.getElementById('additionalTitle').value = note.title;
      document.getElementById('additionalEmoji').value = note.emoji;
      document.getElementById('additionalContent').value = note.content;
      document.getElementById('additionalDay').value = note.day;
    } else {
      document.getElementById('additionalModalTitle').textContent = '新增 Day 2 筆記';
      document.getElementById('additionalId').value = '';
      document.getElementById('additionalTitle').value = '';
      document.getElementById('additionalEmoji').value = '📝';
      document.getElementById('additionalContent').value = '';
      document.getElementById('additionalDay').value = '2';
    }
    
    additionalModal.classList.add('active');
  }

  // Close Additional Modal
  function closeAdditionalModal() {
    additionalModal.classList.remove('active');
    editingAdditionalId = null;
  }

  // Handle Save Additional Note
  function handleSaveAdditional(e) {
    e.preventDefault();

    const title = document.getElementById('additionalTitle').value.trim();
    const emoji = document.getElementById('additionalEmoji').value.trim();
    const content = document.getElementById('additionalContent').value.trim();
    const day = parseInt(document.getElementById('additionalDay').value);

    if (!title || !emoji || !content) {
      showToast('請填寫所有欄位', 'error');
      return;
    }

    if (editingAdditionalId) {
      // Update existing
      const index = additionalNotes.findIndex(n => n.id === editingAdditionalId);
      if (index !== -1) {
        additionalNotes[index] = { id: editingAdditionalId, title, emoji, content, day };
        showToast('筆記已更新', 'success');
      }
    } else {
      // Add new
      const newId = additionalNotes.length > 0 
        ? Math.max(...additionalNotes.map(n => n.id)) + 1 
        : 1;
      additionalNotes.push({ id: newId, title, emoji, content, day });
      showToast('筆記已新增', 'success');
    }

    closeAdditionalModal();
    saveAdditionalNotes();
    renderAdditionalNotes();
  }

  // Open Delete Modal
  function openDeleteModal(type, id) {
    deletingItem = { type, id };
    
    let title = '';
    if (type === 'workshop') {
      const workshop = workshops.find(w => w.id === id);
      title = workshop ? workshop.title : '';
    } else {
      const note = additionalNotes.find(n => n.id === id);
      title = note ? note.title : '';
    }
    
    document.getElementById('deleteTitle').textContent = title;
    
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
    deleteModal.classList.add('active');
  }

  // Close Delete Modal
  function closeDeleteModal() {
    deleteModal.classList.remove('active');
    deletingItem = null;
  }

  // Confirm Delete
  function confirmDelete() {
    if (!deletingItem) return;

    const { type, id } = deletingItem;
    
    if (type === 'workshop') {
      workshops = workshops.filter(w => w.id !== id);
      saveWorkshops();
      renderWorkshops();
    } else {
      additionalNotes = additionalNotes.filter(n => n.id !== id);
      saveAdditionalNotes();
      renderAdditionalNotes();
    }
    
    closeDeleteModal();
    showToast('筆記已刪除', 'success');
  }

  // Show Toast Notification
  function showToast(message, type = 'success') {
    toast.textContent = message;
    toast.className = `toast ${type} show`;
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // Format Date
  function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('zh-TW', { 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
  }

  // Escape HTML
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>

</body>
</html>
